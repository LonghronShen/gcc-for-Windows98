name: Publish Docker Image
on: [ push ]

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  docker_build:
    name: Build Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache source code
        uses: actions/cache@v4
        with:
          path: repro/src
          key: sources-${{ hashFiles('repro/config.json', 'repro/scripts/fetch-sources.sh', 'repro/scripts/lib/common.sh', 'repro/scripts/lib/config_matrix_exports.py') }}
          restore-keys: |
            sources-

      - name: Cache Docker image layers
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: docker-${{ runner.os }}-${{ hashFiles('repro/docker/toolchain-builder.Dockerfile') }}-${{ hashFiles('repro/docker/scripts/*.sh') }}
          restore-keys: |
            docker-${{ runner.os }}-

      - name: Load cached Docker images
        run: |
          if [ -d /tmp/docker-cache ]; then
            for f in /tmp/docker-cache/*.tar; do
              [ -f "$f" ] && echo "Loading $f..." && docker load --quiet < "$f" || true
            done
          fi

      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build
        run: bash ./build.sh
        working-directory: repro

      - name: Save Docker image cache
        if: always()
        run: |
          mkdir -p /tmp/docker-cache
          # Cache the toolchain-builder image (base + apt layers rarely change)
          if docker image inspect gcc-win98-toolchain-builder:latest >/dev/null 2>&1; then
            echo "Caching toolchain-builder image..."
            docker save gcc-win98-toolchain-builder:latest > /tmp/docker-cache/toolchain-builder.tar
          fi

      - name: Tag and push latest
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag gcc-win98-consumer:latest ${{ secrets.DOCKER_USERNAME }}/gcc-win98-consumer:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/gcc-win98-consumer:latest

      - name: Replace tag without `v`
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v9
        id: version
        with:
          script: |
            return context.payload.ref.replace(/\/?refs\/tags\/v/, '')
          result-encoding: string

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: gcc-win98-consumer-${{ steps.version.outputs.result }}
          path: |
            repro/out/package/*.tar.gz
            repro/out/package/*.json
          if-no-files-found: error

      - name: Tag and push release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag gcc-win98-consumer:latest ${{ secrets.DOCKER_USERNAME }}/gcc-win98-consumer:${{ steps.version.outputs.result }}
          docker push ${{ secrets.DOCKER_USERNAME }}/gcc-win98-consumer:${{ steps.version.outputs.result }}
